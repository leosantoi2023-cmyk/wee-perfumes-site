<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — Wee Perfumes</title>
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box }
        body { font-family:'Inter',sans-serif; background:#050505; color:#fff; min-height:100vh;
               display:flex; align-items:center; justify-content:center; padding:20px; text-align:center }
        .cartao { max-width:480px; background:#121212; border:1px solid rgba(212,175,55,.4);
                  border-radius:16px; padding:40px 28px }
        .check { font-size:3.5rem; margin-bottom:12px }
        h1 { font-family:'Playfair Display',serif; color:#D4AF37; font-size:1.6rem; margin-bottom:10px }
        p { color:#ccc; font-size:.95rem; margin-bottom:10px; line-height:1.6 }
        strong { color:#F3E5AB }
        a { display:inline-block; margin-top:18px; padding:13px 26px; border-radius:10px;
            background:linear-gradient(135deg,#F3E5AB,#D4AF37,#997A00); color:#050505;
            font-weight:700; text-decoration:none }
    </style>
</head>
<body>
    <div class="cartao">
        <div class="check">✅</div>
        <h1>Pagamento confirmado!</h1>
        <p>Obrigado pela sua compra na <strong>Wee Perfumes</strong>.</p>
        <p>Seu kit já está sendo preparado e será enviado para o <strong>endereço informado no checkout</strong>. Você receberá as atualizações da entrega pelo <strong>WhatsApp</strong> cadastrado.</p>
        <p>Guarde esta tela como comprovante da confirmação.</p>
        <a href="/">Voltar ao site</a>
    </div>
</body>
</html>
